name: hatt
description: "Hatt — Osmanlıca okuma antrenörü (Ottoman reading trainer)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local-first persistence (Drift / SQLite)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # UI / typography
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Audio effects
  audioplayers: ^6.0.0

  # Local notifications (streak reminder — Phase 6)
  flutter_local_notifications: ^17.1.2

  # i18n
  intl: any

  timezone: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11

# NOTE: Backend SDKs (Firebase, RevenueCat) are intentionally NOT listed here.
# They are abstracted behind interfaces in lib/features/**/domain so the app
# builds and runs fully offline (see CLAUDE.md §2 and §9: "Firebase başlatmayı
# feature flag arkasına al ki backend olmadan da uygulama açılsın"). Wiring the
# real SDKs is a documented seam — see lib/core/config/feature_flags.dart and
# lib/features/league/data/firestore_league_service.dart (guarded stub).

# sqlite3 3.x's native-assets hook downloads a prebuilt libsqlite3 by default.
# In sandboxed/CI environments that download can be blocked or rewritten, so we
# tell the hook to link the system/bundled sqlite3 instead (no download). On
# device, sqlite3_flutter_libs provides the library; on desktop/CI hosts the
# system libsqlite3 is used.
hooks:
  user_defines:
    sqlite3:
      source: system

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/content/
    - assets/mascot/
    - assets/audio/
  # Ottoman script must render offline (local-first, CLAUDE.md §2/§3) — the
  # font is bundled instead of fetched at runtime via google_fonts.
  fonts:
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Variable.ttf
